<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login – Sankalp Digital Pathshala</title>
    <link rel="stylesheet" href="/assets/style.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfjBJILA9Yd-tJq3EUb-Ju1u61mkFh6_89XA&s">
    <style>
        .admin-login-section {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--off-white);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-error {
            color: #ef4444;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }
        .back-home {
            text-align: center;
            margin-top: 1rem;
        }
        .back-home a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
    <link rel="stylesheet" href="/assets/site-upgrade.css?v=1">
</head>
<body>
    <!-- ========== NAVBAR (same as public pages) ========== -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <a href="/" class="logo" aria-label="Sankalp Digital Pathshala Home">
                <img src="https://sankalpshiksha.com/wp-content/uploads/2025/07/SANKALP-SHIKSHA-N-LOGO-2048x415.png" alt="Sankalp Digital Pathshala Logo" width="160" height="48">
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li><a href="/courses">Courses</a></li>
                <li><a href="/study-material">Study Material</a></li>
                <li><a href="/test-series">Test Series</a></li>
                <li><a href="/results">Results</a></li>
                <li><a href="/faculty">Faculty</a></li>
                <li><a href="/about">About Us</a></li>
                <li><a href="/faq">FAQ</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/ai-assistant" class="btn-primary btn-nav">AI Assistant</a>
                <a href="https://wa.me/91XXXXXXXXXX" target="_blank" rel="noopener" class="btn-whatsapp btn-nav">💬 WhatsApp</a>
                <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu">☰</button>
            </div>
        </div>
    </nav>

    <!-- ========== LOGIN SECTION ========== -->
    <section class="admin-login-section">
        <div class="login-card card" style="background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfjBJILA9Yd-tJq3EUb-Ju1u61mkFh6_89XA&s" alt="Sankalp Logo" width="60" height="60">
            </div>
            <h1 class="gradient-text">Admin Access</h1>
            <p style="text-align: center; color: var(--slate); margin-bottom: 1.5rem;">Please enter your admin credentials</p>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@sankalp.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary w-100" style="width:100%;">Sign In</button>
                <div class="login-error" id="loginError"></div>
            </form>
            <div class="back-home">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <div class="container" style="text-align: center; padding: 1.5rem;">
            <p>&copy; 2026 Sankalp Digital Pathshala. All rights reserved.</p>
        </div>
    </footer>

    <script src="/assets/app.js?v=3"></script>
    <script src="/assets/site-upgrade.js?v=1"></script>
</body>
</html>
